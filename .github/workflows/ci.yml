name: CI

# 모든 브랜치로의 PR + main push 시 실행
# 모노레포 구조: backend/ (Spring Boot, Gradle), front/ (React/Node), mobile/ (Flutter)
# paths-filter 로 변경된 폴더의 잡만 실행하여 불필요한 빌드를 건너뜁니다.

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

# 같은 브랜치에서 새 커밋이 오면 이전 러너를 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # 1) 변경된 경로 감지
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      front:   ${{ steps.filter.outputs.front }}
      mobile:  ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            front:
              - 'front/**'
              - '.github/workflows/**'
            mobile:
              - 'mobile/**'
              - '.github/workflows/**'

  # 2) Spring Boot 백엔드 (Gradle + Java 21)
  backend:
    name: Backend (Gradle build & test)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build & Test
        run: ./gradlew --no-daemon clean build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  # 3) React 프런트엔드 (Node 20 + npm, TypeScript/JSX/TSX 지원)
  front:
    name: Front (React lint/typecheck/test/build)
    needs: changes
    if: needs.changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Print tooling versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      # ----- 품질 게이트 -----
      # ESLint: package.json 의 "lint" 스크립트가 있으면 그것을 실행,
      # 없으면 .js/.jsx/.ts/.tsx 에 대해 기본 eslint 를 시도합니다.
      - name: Lint (JS/JSX/TS/TSX)
        run: |
          if node -e "p=require('./package.json');process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            echo "Running: npm run lint"
            npm run lint
          elif [ -f node_modules/.bin/eslint ]; then
            echo "Running: eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0"
            npx --no-install eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0
          else
            echo "No lint script or eslint binary found; skipping."
          fi

      # Prettier: "format:check" 스크립트 또는 prettier 바이너리가 있으면 실행
      - name: Format check (Prettier, optional)
        run: |
          if node -e "p=require('./package.json');process.exit(p.scripts && p.scripts['format:check'] ? 0 : 1)"; then
            npm run format:check
          elif [ -f node_modules/.bin/prettier ]; then
            npx --no-install prettier --check "**/*.{js,jsx,ts,tsx,css,scss,json,md}" || true
          else
            echo "Prettier not configured; skipping."
          fi

      # TypeScript type check: tsconfig.json 이 있으면 tsc --noEmit 실행 (tsx 타입 검증 포함)
      - name: TypeScript type check (tsx/ts)
        run: |
          if [ -f tsconfig.json ]; then
            if node -e "p=require('./package.json');process.exit(p.scripts && p.scripts.typecheck ? 0 : 1)"; then
              echo "Running: npm run typecheck"
              npm run typecheck
            else
              echo "Running: tsc --noEmit"
              npx --no-install tsc --noEmit
            fi
          else
            echo "No tsconfig.json; skipping type check."
          fi

      # ----- 테스트 -----
      # Vitest / Jest / React Testing Library 모두 `npm test` 로 동작하도록 합니다.
      # Vitest 는 watch 가 기본이므로 -- --run 을 전달 (jest 에서는 무시됨)
      - name: Unit tests (Vitest / Jest / RTL)
        run: npm test --if-present -- --run
        env:
          CI: true

      # 커버리지 스크립트가 있으면 추가 실행 + 리포트 업로드
      - name: Coverage (optional)
        id: coverage
        run: |
          if node -e "p=require('./package.json');process.exit(p.scripts && (p.scripts['test:coverage'] || p.scripts.coverage) ? 0 : 1)"; then
            if node -e "p=require('./package.json');process.exit(p.scripts['test:coverage'] ? 0 : 1)"; then
              npm run test:coverage
            else
              npm run coverage
            fi
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "No coverage script; skipping."
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage report
        if: steps.coverage.outputs.has_coverage == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: front-coverage
          path: |
            front/coverage/
          if-no-files-found: ignore
          retention-days: 7

      # ----- 빌드 -----
      - name: Build (Vite / CRA / Next.js)
        run: npm run build
        env:
          CI: true

      - name: Upload build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          # Vite → dist/, CRA → build/, Next.js → .next/
          path: |
            front/dist/
            front/build/
            front/.next/
          if-no-files-found: ignore
          retention-days: 7

  # 4) Flutter 모바일
  mobile:
    name: Mobile (Flutter analyze & test)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter --version
        run: flutter --version

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

  # 5) 모든 잡 통과 여부를 종합 (branch protection용 status check)
  ci-success:
    name: CI Success
    needs: [backend, front, mobile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Front:   ${{ needs.front.result }}"
          echo "Mobile:  ${{ needs.mobile.result }}"

          fail=0
          for r in "${{ needs.backend.result }}" "${{ needs.front.result }}" "${{ needs.mobile.result }}"; do
            case "$r" in
              success|skipped|'') ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -eq 1 ]; then
            echo "::error::One or more jobs failed."
            exit 1
          fi
          echo "All jobs passed (or skipped)."
